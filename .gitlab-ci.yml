stages:
  - test
  - lint
  - deploy

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

lint:
  stage: lint
  script:
    - npm ci --legacy-peer-deps
    - npm run lint
    - npx prettier --check "src/**/*.{js,css}"

test:
  stage: test
  needs: []
  script:
    - npm ci --legacy-peer-deps
    - npm test -- --watchAll=false --ci # runs Jest once and completes (not interactive)

deploy_staging:
  stage: deploy
  only:
    - main
  image: alpine:latest
  before_script:
    - apk add --no-cache docker-cli docker-compose-plugin openssh-client
  # setup ssh key
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  # trust server
    - ssh-keyscan 172.27.61.59 >> ~/.ssh/known_hosts
  script:
    - export DOCKER_HOST=ssh://ubuntu@172.27.61.59
    - export DOCKER_PORT=80
    - export SESSION_SECRET=test123

    - docker compose -f docker-compose.yaml -f docker-compose.production.yaml up --build -d
