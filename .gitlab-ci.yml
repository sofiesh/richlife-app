stages:
  - install
  - lint
  - test
  - build
  - deploy

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/

install:
  stage: install
  script:
    - npm ci --legacy-peer-deps
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: lint
  dependencies:
    - install
  script:
    - npm run lint
    - npx prettier --check "src/**/*.{js,css}"

test:
  stage: test
  dependencies:
    - install
  script:
    - npm test -- --watchAll=false --ci --forceExit # runs Jest once and completes (not interactive)

build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 week

deploy_staging:
  stage: deploy
  only:
    - main
  image: alpine:latest
  cache: []

  before_script:
    - apk add --no-cache docker-cli docker-compose openssh-client  
  # setup ssh key
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  # trust server
    - ssh-keyscan 172.27.61.59 >> ~/.ssh/known_hosts
  
  script:
    - export DOCKER_HOST=ssh://ubuntu@172.27.61.59
    - export REACT_APP_SUPABASE_URL=$REACT_APP_SUPABASE_URL
    - export REACT_APP_SUPABASE_ANON_KEY=$REACT_APP_SUPABASE_ANON_KEY
    - docker rm -f budgetapp budget-app-caddy-1 2>/dev/null || true
    - docker-compose -f docker-compose.yaml -f docker-compose.production.yaml up --build -d