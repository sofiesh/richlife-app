stages:
  - test
  - lint
  - docker
  - deploy

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

lint:
  stage: lint
  script:
    - npm ci --legacy-peer-deps
    - npm run lint
    - npx prettier --check "src/**/*.{js,css}"

test:
  stage: test
  needs: []
  script:
    - npm ci --legacy-peer-deps
    - npm test -- --watchAll=false --ci # runs Jest once and completes (not interactive)

docker:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker compose build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy_staging:
  stage: deploy
  only:
    - main
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
  script:
    - docker compose -f docker-compose.yaml -f docker-compose.production.yaml up --build -d
  only:
    - main