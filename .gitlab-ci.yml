stages:
  - install
  - lint
  - test
  - deploy

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/

install:
  stage: install
  script:
    - npm ci --legacy-peer-deps
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: lint
  dependencies:
    - install
  script:
    - npm run lint
    - npx prettier --check "src/**/*.{js,css}"

test:
  stage: test
  dependencies:
    - install
  script:
    - npm test -- --watchAll=false --ci --forceExit # runs Jest once and completes (not interactive)

deploy_staging:
  stage: deploy
  only:
    - main
  tags:
    - vps-deploy
  dependencies: [] # do not load node_modules.
  cache: [] # do not use cache, Docker handles on server.
  script:
    - docker compose -f docker-compose.yaml -f docker-compose.production.yaml up --build -d --remove-orphans
    - docker system prune -f
